services:
  funnypot:
    build: .
    env_file: .env
    container_name: funnypot-container
    ports:
      - "22722:22722"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - SSH_USER=${SSH_USER:-test}
      - SSH_PASSWORD=${SSH_PASSWORD:-test}
      - SSH_PORT=${SSH_PORT:-22722}
