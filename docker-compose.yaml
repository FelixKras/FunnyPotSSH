services:
  funnypot:
    build: .
    container_name: funnypot-container
    ports:
      - "22722:22722"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    secrets:
      - github_token
      - github_user
      - openrouter_api_key
    environment:
      - SSH_USER=${SSH_USER:-test}
      - SSH_PASSWORD=${SSH_PASSWORD:-test}
      - SSH_PORT=${SSH_PORT:-22722}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - STATIC_SITE_REMOTE_URL=${STATIC_SITE_REMOTE_URL:-}
      - GITHUB_DATA_BRANCH=${GITHUB_DATA_BRANCH:-data}

secrets:
  github_token:
    file: ./.secrets/github_token
  github_user:
    file: ./.secrets/github_user
  openrouter_api_key:
    file: ./.secrets/openrouter_api_key
