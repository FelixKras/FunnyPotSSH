# Application Configuration
# Centralized configuration for magic numbers and tunable parameters

ssh:
  # SSH Server Configuration
  port: 22422
  banner: "SSH-2.0-OmegaBlack_Classified_Server_v1.0"
  user: "remote"
  password: "test"
  
  # Connection Limits
  max-sessions: 50
  session-idle-timeout-seconds: 300
  
  # Authentication
  auth-max-tries: 3
  password-harvest-attempt: 3  # Max(1, Min(auth-max-tries, 3))
  
  # Banner Rotation
  banner-rotation-interval: 0  # 0 = disabled, set to seconds to enable
  
# LLM Configuration
llm:
  delay-ms: 500
  rate-limit-max-per-window: 20
  rate-limit-window-seconds: 60
  model: "minimax/minimax-m3"
  fallback-models:
    - "nvidia/nemotron-3-super-120b-a12b:free"
  max-tokens: 2000
  timeout-seconds: 30

# Logging
logging:
  log-dir: "/var/log/funnypot"

# Data Harvesting Thresholds
data-harvester:
  max-input-length: 4096
  max-repetitive-chars: 100
  max-payload-capture-bytes: 10485760  # 10 * 1024 * 1024

# API Endpoints
api:
  open-router:
    base-url: "https://openrouter.ai/api/v1"
    auth-endpoint: "/auth/key"
    chat-endpoint: "/chat/completions"
    
# Git Integration
git:
  data-branch: "data"
  user: ""  # Set via GITHUB_USER env var or secrets
  token: ""  # Set via GITHUB_TOKEN env var or secrets

# Static Response Files
static-responses:
  data-path: "data/ssh_responses.jsonl"

auto-research:
  program-path: "autoresearch/program.md"
  worktree-path: "."
  mutable-paths:
    - "FunnyPot/Program.cs"
    - "FunnyPot/FakeFileSystem.cs"
    - "FunnyPot/data/ssh_responses.jsonl"
  agent-command: "opencode run --agent build --model openai/gpt-5.5-fast --dangerously-skip-permissions 'Read autoresearch/program.md and make one small FunnyPot improvement within the configured mutable paths only. Preserve tests. Do not commit changes. Make one narrow change, then stop.'"
  setup-command: "dotnet restore FunnyPot.sln"
  experiment-command: "dotnet test FunnyPot.sln"
  metric-regex: "autoresearch_metric\\s*=\\s*(?<value>-?\\d+(?:\\.\\d+)?)"
  lower-is-better: false
  iterations: 1
  time-budget-seconds: 300
  state-path: "autoresearch/state.json"
  allow-git-mutations: false
