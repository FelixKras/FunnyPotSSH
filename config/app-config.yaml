# Application Configuration
# Centralized configuration for magic numbers and tunable parameters

SSH:
  # SSH Server Configuration
  Port: 22422
  Banner: "SSH-2.0-OmegaBlack_Classified_Server_v1.0"
  User: "remote"
  Password: "test"
  
  # Connection Limits
  MaxSessions: 50
  SessionIdleTimeoutSeconds: 300
  
  # Authentication
  AuthMaxTries: 3
  PasswordHarvestAttempt: 3  # Max(1, Min(AuthMaxTries, 3))
  
  # Banner Rotation
  BannerRotationInterval: 0  # 0 = disabled, set to seconds to enable
  
# LLM Configuration
LLM:
  DelayMs: 500
  RateLimitMaxPerWindow: 20
  RateLimitWindowSeconds: 60
  Model: "mistralai/mistral-nemo"
  MaxTokens: 2000
  TimeoutSeconds: 30

# Logging
Logging:
  LogDir: "/var/log/funnypot"

# Data Harvesting Thresholds
DataHarvester:
  MaxInputLength: 4096
  MaxRepetitiveChars: 100
  MaxPayloadCaptureBytes: 10485760  # 10 * 1024 * 1024

# Notification Settings
Notification:
  Enabled: false
  Priority: "high"
  Tags: "warning,computer"

# API Endpoints
API:
  OpenRouter:
    BaseUrl: "https://openrouter.ai/api/v1"
    AuthEndpoint: "/auth/key"
    ChatEndpoint: "/chat/completions"
    
# Git Integration
Git:
  DataBranch: "data"
  User: ""  # Set via GITHUB_TOKEN env var or secrets
  Token: ""  # Set via GITHUB_USER env var or secrets

# Static Response Files
StaticResponses:
  DataPath: "data/ssh_responses.jsonl"
